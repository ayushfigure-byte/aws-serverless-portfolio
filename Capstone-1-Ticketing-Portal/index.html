<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; text-align: center; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h2>Submit Support Ticket</h2>
    <form id="ticketForm">
        <label for="name">Your Name:</label>
        <input type="text" id="name" required>

        <label for="priority">Priority:</label>
        <select id="priority">
            <option value="Low">Low</option>
            <option value="Normal" selected>Normal</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
        </select>

        <label for="issue">Describe the Issue:</label>
        <textarea id="issue" rows="4" required></textarea>

        <button type="submit">Submit Ticket</button>
    </form>
    <div id="result"></div>
</div>

<script>
    document.getElementById('ticketForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 

        const name = document.getElementById('name').value;
        const priority = document.getElementById('priority').value;
        const issue = document.getElementById('issue').value;
        const resultDiv = document.getElementById('result');
        
        resultDiv.innerHTML = "Submitting securely to AWS...";
        resultDiv.className = "";

        const payload = {
            customer_name: name,
            priority: priority,
            issue: issue
        };

        // REPLACE THIS URL IF REBUILDING THE ARCHITECTURE
        const apiUrl = 'YOUR_API_GATEWAY_INVOKE_URL_HERE';

        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                resultDiv.innerHTML = `Success! Ticket ID: <br>${data.ticket_id}`;
                resultDiv.className = "success";
                document.getElementById('ticketForm').reset();
            } else {
                resultDiv.innerHTML = "Server Error. Check API Gateway logs.";
                resultDiv.className = "error";
            }
        } catch (error) {
            console.error('Error:', error);
            resultDiv.innerHTML = "Network Error. This is usually a CORS issue. Check browser console.";
            resultDiv.className = "error";
        }
    });
</script>

</body>
</html>
